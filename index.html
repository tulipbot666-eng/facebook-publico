  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 0 16px; height: 56px; box-shadow: 0 2px 8px rgba(0,0,0,.08); gap: 10px; }

  .live-badge { display: flex; align-items: center; gap: 6px; background: var(--blue-light); color: var(--blue); border-radius: 20px; padding: 5px 12px; font-size: 13px; font-weight: 700; }

  .fb-link { display: flex; align-items: center; gap: 6px; background: var(--blue); color: #fff; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 700; text-decoration: none; }
  .cover-wrap { background: var(--white); border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .cover-photo { width: 100%; height: 240px; background: linear-gradient(135deg, #1877f2, #42b0f5, #a259ff); }
  .cover-inner { max-width: 940px; margin: 0 auto; padding: 0 16px; }
  .profile-row { display: flex; align-items: flex-end; gap: 16px; padding-bottom: 12px; transform: translateY(-20px); flex-wrap: wrap; }
  .page-avatar { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--white); flex-shrink: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 70px; }
  .profile-info { flex: 1; padding-bottom: 4px; min-width: 160px; }
  .profile-name { font-size: 28px; font-weight: 900; }
  .profile-sub { color: var(--sec); font-size: 14px; margin-top: 4px; }
  .profile-actions { display: flex; gap: 8px; padding-bottom: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; border: none; text-decoration: none; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-secondary { background: var(--hover); color: var(--text); border: 1px solid var(--border); }
  .tabs-bar { border-top: 1px solid var(--border); display: flex; padding: 0 16px; max-width: 940px; margin: 0 auto; }
  .tab { padding: 12px 16px; font-weight: 700; font-size: 15px; border-bottom: 3px solid transparent; color: var(--sec); }
  .tab.active { color: var(--blue); border-color: var(--blue); }
  .main { max-width: 680px; margin: 0 auto 32px; padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .post-box { background: var(--white); border-radius: 8px; box-shadow: var(--shadow); padding: 12px 16px; }
  .post-box-top { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .mini-av { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .trigger { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; cursor: pointer; color: var(--sec); font-family: inherit; font-size: 16px; text-align: left; }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .post-actions { display: flex; gap: 4px; }
  .act-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--sec); background: none; border: none; }
  .fb-embed { background: var(--white); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; padding: 16px; text-align: center; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; box-shadow: 0 -4px 32px rgba(0,0,0,.2); }
  .modal-head { display: flex; align-items: center; justify-content: center; padding: 14px 16px; border-bottom: 1px solid var(--border); position: relative; }
  .modal-head h2 { font-size: 20px; font-weight: 800; }
  .modal-close { position: absolute; right: 14px; background: var(--bg); border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 16px; }
  .modal-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .modal-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 700; margin-top: 3px; display: inline-block; }
  textarea.post-ta { width: 100%; min-height: 100px; border: none; outline: none; resize: none; font-family: inherit; font-size: 18px; color: var(--text); background: transparent; line-height: 1.4; }
  textarea.post-ta::placeholder { color: #bcc0c4; }

  .media-preview { margin: 10px 0; border-radius: 8px; overflow: hidden; position: relative; }
  .media-preview img, .media-preview video { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; display: block; }
  .remove-media { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; }
  .modal-footer { padding: 12px 16px 32px; position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); }
  .btn-post { width: 100%; padding: 14px; border-radius: 8px; background: var(--blue); color: #fff; border: none; font-family: inherit; font-size: 17px; font-weight: 800; cursor: pointer; -webkit-tap-highlight-color: transparent; }

  .progress-bar { width: 0%; height: 4px; background: var(--blue); border-radius: 2px; margin-top: 8px; transition: width .3s; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1c1e21; color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: 700; font-size: 15px; z-index: 300; transition: transform .3s; text-align: center; max-width: 90vw; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  @media (min-width: 601px) {
    .overlay { align-items: center; }
    .modal { border-radius: 12px; }
    .modal-footer { padding: 12px 16px 16px; }
  }

    .page-avatar { width: 90px; height: 90px; font-size: 40px; }
    .profile-name { font-size: 20px; }
    .cover-photo { height: 160px; }
    .profile-row { transform: translateY(-10px); }
    .main { padding: 0 8px; }
    .live-badge span:not(.dot) { display: none; }
  }
</style>

  function censurar(texto) {
    var result = texto;
    CENSURA.forEach(function(par) {
      try {
        var regex = new RegExp(par[0], 'gi');
        result = result.replace(regex, par[1]);
      } catch(e) {}
    });
    return result;
  }

  // Emojis genГ©ricos por posiГ§ГЈo da letra
  var EMOJI_GENERICOS = ['рҹ”Ҙ','рҹ’©','рҹӨЎ','рҹ’Җ','рҹҡ«','вҡЎ','рҹ’Ҙ','рҹҢҲ','рҹҚҶ','рҹҗұ','рҹҚ‘','рҹ’Ӣ'];

  function emojiGenerico(palavra, posicao) {
    var idx = (palavra.charCodeAt(0) + posicao) % EMOJI_GENERICOS.length;
    return EMOJI_GENERICOS[idx];
  }

  function censurarPalavraDesconhecida(palavra) {
    if (palavra.length <= 2) return palavra;
    var meio = Math.floor(palavra.length / 2);
    var emoji = emojiGenerico(palavra, meio);
    return palavra.substring(0, meio) + emoji + palavra.substring(meio + 1);
  }

  function censurarComPurgo(textoOriginal, textoCensurado) {
    return fetch('https://www.purgomalum.com/service/json?text=' + encodeURIComponent(textoOriginal))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.result) return textoCensurado;
        var purgoResult = data.result;
        // Encontra palavras que o purgo censurou (tem ***) comparando com original
        var palavrasOriginais = textoOriginal.split(/\s+/);
        var palavrasPurgo = purgoResult.split(/\s+/);
        var resultado = textoCensurado;
        palavrasOriginais.forEach(function(palavra, i) {
          var palavraLimpa = palavra.replace(/[^a-zA-Z]/g, '').toLowerCase();
          var purgoWord = (palavrasPurgo[i] || '').toLowerCase();
          // Se o purgo censurou essa palavra (tem asterisco) e nossa lista nao censurou
          if (purgoWord.indexOf('*') !== -1 && palavraLimpa.length > 2) {
            // Verifica se nossa lista ja censurou
            var jaCensurou = false;
            CENSURA.forEach(function(par) {
              if (par[0].toLowerCase() === palavraLimpa) jaCensurou = true;
            });
            if (!jaCensurou) {
              // Censura com emoji no estilo da lista
              var censurada = censurarPalavraDesconhecida(palavra);
              var regex = new RegExp('\\b' + palavra.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
              resultado = resultado.replace(regex, censurada);
            }
          }
        });
        return resultado;
      })
      .catch(function() { return textoCensurado; });
  }

    // PUBLICAR
  function publish() {
    var text = document.getElementById('postText').value.trim();
    if (!text && !selectedFile) {
      showToast('вңҚпёҸ Escreva algo ou adicione uma foto/vГӯdeo!', '');
      return;
    }

    var textoCensurado = censurar(text || '');
    btn.disabled = true;
    btn.textContent = 'рҹ”Қ Verificando...';
    setProgress(10);

    // Passa pelo PurgoMalum pra pegar palavras que nossa lista nГЈo conhece
    censurarComPurgo(text || '', textoCensurado).then(function(textoFinal) {
      var fullText = textoFinal + SITE_LINK;

    function doPost() {
      btn.textContent = 'Publicando...';
      setProgress(50);

      var promise;
      if (selectedFile && selectedFile.type.indexOf('image') === 0) {
        var fd = new FormData();
        fd.append('source', selectedFile);
        fd.append('message', fullText);
        fd.append('access_token', PAGE_TOKEN);
        promise = fetch(API + '/' + PAGE_ID + '/photos', { method: 'POST', body: fd }).then(function(r) { return r.json(); });
      } else if (selectedFile && selectedFile.type.indexOf('video') === 0) {
        var fd2 = new FormData();
        fd2.append('source', selectedFile);
        fd2.append('description', fullText);
        fd2.append('access_token', PAGE_TOKEN);
        promise = fetch(API + '/' + PAGE_ID + '/videos', { method: 'POST', body: fd2 }).then(function(r) { return r.json(); });
      } else {
        promise = fetch(API + '/' + PAGE_ID + '/feed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: fullText, access_token: PAGE_TOKEN })
        }).then(function(r) { return r.json(); });
      }

      promise.then(function(data) {
        if (data.id || data.post_id) {
          setProgress(100);
          showToast('вң… Publicado no Facebook!', 'success');
          closeModal();
          setTimeout(function() { if (window.FB) FB.XFBML.parse(); }, 2000);
        } else {
          showToast('вқҢ ' + ((data.error && data.error.message) || 'Tente novamente'), 'error');
        }
      }).catch(function() {
        showToast('вқҢ Erro de conexГЈo', 'error');
      }).finally(function() {
        setProgress(0);
        btn.disabled = false;
        btn.textContent = 'Publicar no Facebook';
      });
    }

    if (selectedFile) {
      var moderatePromise = selectedFile.type.indexOf('video') === 0
        ? moderateVideo(selectedFile)
        : moderateFile(selectedFile);
      moderatePromise.then(function(result) {
        if (!result.safe) {
          showToast(result.reason, 'error');
          setProgress(0);
          btn.disabled = false;
          btn.textContent = 'Publicar no Facebook';
          return;
        }
        doPost();
      });
    } else {
      doPost();
    }
    }); // fecha censurarComPurgo
  }

  // BotГЈo publicar - mГәltiplos eventos para compatibilidade mobile
  var postBtn = document.getElementById('postBtn');
  postBtn.addEventListener('click', publish);
  postBtn.addEventListener('touchstart', function(e) { e.preventDefault(); publish(); }, { passive: false });
</script>
